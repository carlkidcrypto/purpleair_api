name: go/test
permissions:
  contents: read

on:
  push:
    branches: [ main, feature/swig ]
    paths:
      - 'go/**'
      - 'swig/**'
      - '.github/workflows/go_test.yml'

  pull_request:
    branches: [ main, feature/swig ]

jobs:
  check-source-changes:
    runs-on: ubuntu-latest
    outputs:
      run_job: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout Sourcecode
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check for changes in Go source code
        id: changed-files
        uses: tj-actions/changed-files@c3a1bb2c992d77180ae65be6ae6c166cf40f857c # v46.0.1
        with:
          files: |
            go/**
            swig/**
            .github/workflows/go_test.yml

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.21', '1.22', '1.23']
    needs: check-source-changes
    if: needs.check-source-changes.outputs.run_job == 'true'
    steps:
      - name: Check out repository code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go/go.sum

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev swig build-essential

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install curl swig || true

      - name: Install Meson and Ninja
        run: pip install meson ninja

      - name: Configure with Meson
        run: meson setup builddir -Dcsharp_bindings=false -Djavascript_bindings=false

      - name: Build with Ninja
        run: ninja -C builddir

      - name: Run Go tests
        working-directory: ./go
        run: go test ./tests/...
