name: "Pull Request Sphinx Docs Check"

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  check-source-changes:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      run_job: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout Sourcecode
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check for changes in source code
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v46.0.1
        with:
          files: |
            sphinx_docs_build/source/*.rst
            sphinx_docs_build/source/*.py
            sphinx_docs_build/*.txt
            .github/workflows/sphinx_build.yml

  sphinx_docs_build:
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    needs: check-source-changes
    if: needs.check-source-changes.outputs.run_job == 'true'
    steps:
      - name: Check out repository code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.12 env for sphinx...
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install python3/os requirements...
        uses: carlkidcrypto/os-specific-runner@6bfb32d4934b42e6817f3f4109c9f3c26abc9fab # v2.3.1
        with:
          linux: cd /home/runner/work/purpleair_api/purpleair_api/ &&
                 python -m pip install --upgrade wheel &&
                 python -m pip install --upgrade setuptools &&
                 python -m pip install --upgrade pip &&
                 python -m pip install -r sphinx_docs_build/requirements.txt &&
                 python -m pip install . --user;

      - name: Run sphinx...
        uses: carlkidcrypto/os-specific-runner@6bfb32d4934b42e6817f3f4109c9f3c26abc9fab # v2.3.1
        with:
          linux: cd /home/runner/work/purpleair_api/purpleair_api/sphinx_docs_build;
                 mkdir -p source/_static;
                 mkdir -p source/_templates;
                 make clean && make html SPHINXOPTS="-W"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.4.3
        with:
          name: HTML Documentation
          path: docs/