name: quality/codeql

on:
  push:
    branches: [ main, feature/swig ]
    paths:
      - 'python/**/*.py'
      - 'javascript/**/*.js'
      - 'csharp/**/*.cs'
      - 'swig/**/*.cpp'
      - 'swig/**/*.h'
      - '.github/workflows/quality_codeql.yml'
  pull_request:
    branches: [ main, feature/swig ]
  schedule:
    - cron: '30 2 * * 1'  # Run every Monday at 2:30 AM UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    timeout-minutes: ${{ (matrix.language == 'swift' && 120) || 360 }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: python
          build-mode: none
        - language: javascript-typescript
          build-mode: none
        - language: csharp
          build-mode: autobuild
        - language: c-cpp
          build-mode: manual

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Install system dependencies
      if: matrix.language == 'c-cpp' || matrix.language == 'csharp'
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev swig build-essential mono-complete

    - name: Initialize CodeQL
      uses: github/codeql-action/init@1b549b9259bda1cb5ddde3b41741a82a2d15a841 # v3.28.13
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Build C++ code
      if: matrix.language == 'c-cpp'
      run: |
        pip install meson ninja
        meson setup builddir -Dcsharp_bindings=false -Dgo_bindings=false -Djavascript_bindings=false
        ninja -C builddir

    - if: matrix.build-mode == 'autobuild'
      name: Autobuild
      uses: github/codeql-action/autobuild@1b549b9259bda1cb5ddde3b41741a82a2d15a841 # v3.28.13

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@1b549b9259bda1cb5ddde3b41741a82a2d15a841 # v3.28.13
      with:
        category: "/language:${{matrix.language}}"
