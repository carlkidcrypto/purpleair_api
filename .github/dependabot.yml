updates:
- directory: /
  ignore:
     - dependency-name: "github/gh-aw-actions" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  package-ecosystem: github-actions
  open-pull-requests-limit: 10
  schedule:
    interval: daily
- directory: /
  package-ecosystem: pip
  open-pull-requests-limit: 10
  schedule:
    interval: daily
version: 2
